server {
    listen 80;
    server_name purduefuelinitiative.org www.purduefuelinitiative.org;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name purduefuelinitiative.org www.purduefuelinitiative.org;

    # SSL certs managed by certbot
    ssl_certificate /etc/letsencrypt/live/purduefuelinitiative.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purduefuelinitiative.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
